version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pn-nangabulik-app
    environment:
      NODE_ENV: production
      # Add other environment variables as needed
      # DATABASE_URL: your-external-database-url (if needed)
      # NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # NEXTAUTH_URL: ${NEXTAUTH_URL}
    volumes:
      - ./upload:/app/upload
      - ./public:/app/public
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - pn-network

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: pn-nangabulik-caddy
    depends_on:
      - app
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ACME_AGREE: "true"
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - pn-network

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  pn-network:
    driver: bridge

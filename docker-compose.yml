services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pn-nangabulik:latest
    container_name: pn-nangabulik
    restart: unless-stopped

    # Secrets/DB dari .env host — TIDAK dibakar ke image
    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_OPTIONS: --dns-result-order=ipv4first
      UV_THREADPOOL_SIZE: 16
      TZ: Asia/Jakarta

    ports:
      # Hanya loopback host — tidak terbuka ke internet.
      # Nginx aaPanel di host meneruskan via proxy_pass http://127.0.0.1:3000.
      - "127.0.0.1:3000:3000"

    volumes:
      - ./upload:/app/upload
      - ./download:/app/download
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/maintenance', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Rotate Docker JSON log supaya disk tidak penuh
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Batas resource — sesuaikan dengan VPS
    deploy:
      resources:
        limits:
          memory: 900M

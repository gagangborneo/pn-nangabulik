# Additional Docker compose file untuk development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  app:
    environment:
      NODE_ENV: development
      DEBUG: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  caddy:
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"  # Caddy admin API
